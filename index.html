<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Your Document</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* Premium aesthetics */
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --input-bg: rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 0.875rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    .message {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      min-height: 1.2rem;
      color: var(--text-muted);
    }

    .message.success {
      color: #34d399;
    }

    .message.error {
      color: #f87171;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Get Your PDF</h1>
    <p class="subtitle">Enter your details to receive the document instantly to your inbox.</p>

    <form id="pdfForm">
      <input type="text" name="name" placeholder="First Name" required />
      <input type="email" name="email" placeholder="Email Address" required />
      <button type="submit">Send me the PDF</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById("pdfForm");
    const messageDiv = document.getElementById("message");
    const submitBtn = form.querySelector("button");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      messageDiv.textContent = "Sending email...";
      messageDiv.className = "message";
      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      const payload = {
        name: form.name.value,
        email: form.email.value,
      };

      try {
        // Updated URL pointing to your netlify functions backend
        const res = await fetch("qrscannern.netlify.app/.netlify/functions/sendEmail", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (res.ok) {
          messageDiv.textContent = "Thank you! Check your email for the PDF.";
          messageDiv.classList.add("success");
          form.reset();
        } else {
          messageDiv.textContent = "Something went wrong. Please try again.";
          messageDiv.classList.add("error");
        }
      } catch (err) {
        messageDiv.textContent = "Network error. Try again.";
        messageDiv.classList.add("error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send me the PDF";
      }
    });
  </script>
</body>

</html>
